
name: 02 - create idp secrets

on:
  workflow_dispatch:
  workflow_call:

jobs:
  create_secrets:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: create and label secret
      run: |
        source ${GITHUB_WORKSPACE}/nkp-vars.sh
        export PATH=$PATH:~/bin
        export KUBECONFIG=~/kubectl-configs/$CLUSTER_NAME.conf
        export SECRET_NAME=auth0-secret
        export CLIENT_ID=$( echo ${{secrets.AUTH0_CLIENT_ID}}| tr -d '\n' | base64 -w0)
        export CLIENT_SECRET=$( echo ${{secrets.AUTH0_CLIENT_SECRET}} | tr -d '\n' | base64 -w0)
        cat ./secrets/auth0-secret.yaml | envsubst | kubectl apply --server-side -f -
        kubectl create secret generic cloudflare-api-key --from-literal=apiKey=${{secrets.CF_API_KEY}}  -n kommander
