
name: 05b - velero with nutanix objects

on:
  workflow_dispatch:
    inputs:
      NUTANIX_OBJECTS_HOST:
        description: 'Nutanix Objects Host (e.g., objects.example.com)'
        required: true
        default: 'objects.nutanix.local'
      NUTANIX_OBJECTS_ACCESS_KEY:
        description: 'Nutanix Objects Acess Key'
        required: true
      NUTANIX_OBJECTS_SECRET_KEY:
        description: 'Nutanix Objects Secret Key'
        required: true

jobs:
  velero:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: create velero secret
      run: |
        source ${GITHUB_WORKSPACE}/nkp-vars.sh
        export PATH=$PATH:~/bin
        export KUBECONFIG=~/kubectl-configs/$CLUSTER_NAME.conf
        source ./appdeployments/velero/velero-vars
        export PROFILEDATA=$(echo "[${AWS_PROFILE}]
        aws_access_key_id=${{ inputs.NUTANIX_OBJECTS_ACCESS_KEY }}
        aws_secret_access_key=${{ inputs.NUTANIX_OBJECTS_SECRET_KEY }}" | base64 -w0)
        cat ./appdeployments/velero/velero-secret.yaml | envsubst | kubectl apply -f -

    - name: apply velero configmap
      run: |
        source ${GITHUB_WORKSPACE}/nkp-vars.sh
        export PATH=$PATH:~/bin
        export KUBECONFIG=~/kubectl-configs/$CLUSTER_NAME.conf
        source ./appdeployments/velero/velero-vars
        export NUTANIX_OBJECTS_HOST="${{ inputs.NUTANIX_OBJECTS_HOST }}"
        cat ./appdeployments/velero/velero-cm.yaml | envsubst | kubectl apply -f -

