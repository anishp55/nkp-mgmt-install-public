name: 05a - update kommander

on:
  workflow_dispatch:
  workflow_call:


jobs:
  kommander:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./
    steps:
    - name: Checkout code
      uses: actions/checkout@main

    - name: apply kommander configmap
      run: |
        source ${GITHUB_WORKSPACE}/nkp-vars.sh
        export PATH=$PATH:~/bin
        export KUBECONFIG=~/kubectl-configs/$CLUSTER_NAME.conf
        kubectl apply -f ./appdeployments/kommander/kommander-cm.yaml

    - name: update kommander appdeployment
      run: |
        source ${GITHUB_WORKSPACE}/nkp-vars.sh
        export PATH=$PATH:~/bin
        export KUBECONFIG=~/kubectl-configs/$CLUSTER_NAME.conf
        nkp create appdeployment kommander --app kommander-0.17.1 -c kommander-overrides -w kommander-workspace --dry-run -oyaml | kubectl apply -f -
