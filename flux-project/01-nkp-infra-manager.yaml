---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nkp-infra-manager-role
rules:
  # NKP / Kommander Specific Resources
  - apiGroups:
      - "workspaces.kommander.mesosphere.io"
      - "projects.kommander.mesosphere.io"
      - "kommander.mesosphere.io"
    resources:
      - "workspaces"
      - "projects"
      - "appdeployments"
      - "kommanderclusters"
    verbs: ["*"]

  # Cluster API (CAPI) - For deploying the actual clusters
  - apiGroups:
      - "cluster.x-k8s.io"
      - "infrastructure.cluster.x-k8s.io"
      - "controlplane.cluster.x-k8s.io"
      - "bootstrap.cluster.x-k8s.io"
    resources: ["*"]
    verbs: ["*"]

  # Cross-project / Federated resources often used in NKP
  - apiGroups: ["tokens.kommander.mesosphere.io"]
    resources: ["*"]
    verbs: ["*"]

  # External Secrets Operator resources reconciled by child Flux Kustomizations
  - apiGroups: ["external-secrets.io"]
    resources: ["*"]
    verbs: ["*"]

  # Workspace-scoped identities and RBAC needed by ESO SecretStores
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["*"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nkp-infra-manager-binding
subjects:
- kind: ServiceAccount
  name: infra-flux-validation
  namespace: infra-flux-validation
roleRef:
  kind: ClusterRole
  name: nkp-infra-manager-role
  apiGroup: rbac.authorization.k8s.io
