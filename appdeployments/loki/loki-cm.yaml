apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-loki-overrides
  namespace: kommander
data:
  values.yaml: |
    loki:
      structuredConfig:
        storage_config:
          boltdb_shipper:
            shared_store: s3
            active_index_directory: /var/loki/index
            cache_location: /var/loki/cache
            cache_ttl: 168h
          aws:
            s3: "http://${NUTANIX_OBJECTS_HOST}/${BUCKET}"
            s3forcepathstyle: true
            region: us-east-1
        compactor:
          shared_store: s3
          retention_enabled: true
          compaction_interval: 10m
          retention_delete_delay: 2h
          working_directory: /var/loki/compactor
        chunk_store_config:
          max_look_back_period: 0s

    ingester:
      extraEnvFrom:
        - secretRef:
            name: nutanix-loki-credentials
    querier:
      extraEnvFrom:
        - secretRef:
            name: nutanix-loki-credentials
    queryFrontend:
      extraEnvFrom:
        - secretRef:
            name: nutanix-loki-credentials
    compactor:
      extraEnvFrom:
        - secretRef:
            name: nutanix-loki-credentials
    distributor:
      extraEnvFrom:
        - secretRef:
            name: nutanix-loki-credentials
    ruler:
      extraEnvFrom:
        - secretRef:
            name: nutanix-loki-credentials